version: "3.9"

services:
  # ── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: topcat
      POSTGRES_DB: o3fs_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Python Energy Engine (FastAPI) ───────────────────────────────
  energy-engine:
    build:
      context: ./apps/energy-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js API (Express) ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:topcat@postgres:5432/o3fs_dev?schema=public
      JWT_SECRET: energyflow_secure_jwt_secret_2026
      REGISTRATION_TOKEN: energy_secret_2026
      ENERGY_ENGINE_URL: http://energy-engine:8000
    depends_on:
      postgres:
        condition: service_started
      energy-engine:
        condition: service_healthy

  # ── Next.js Frontend ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data:
